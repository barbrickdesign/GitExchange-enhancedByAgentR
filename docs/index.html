<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitExchange Pro Terminal</title>
  <meta name="description" content="Pro trading terminal for open-source repo markets with Solana settlement support.">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #06090f;
      --surface: #0f1521;
      --panel: #141c2a;
      --border: #243149;
      --text: #e6edf3;
      --muted: #8ba0bb;
      --green: #22c55e;
      --red: #ef4444;
      --accent: #8b5cf6;
      --accent-2: #14b8a6;
      --gold: #f6c453;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% -10%, #2a1242 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
    }

    .container { max-width: 1320px; margin: 0 auto; padding: 18px; }
    .glass {
      background: linear-gradient(180deg, rgba(20, 28, 42, 0.95), rgba(15, 21, 33, 0.95));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand h1 { margin: 0; font-size: 1.45rem; letter-spacing: 0.4px; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 0.85rem; }

    .status { display: flex; align-items: center; gap: 12px; }
    .chip {
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.35);
      border-radius: 999px;
      font-size: 0.78rem;
      padding: 6px 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .chip.closed {
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.4);
    }

    .muted { color: var(--muted); font-size: 0.82rem; }

    .ticker-tape {
      overflow: hidden;
      white-space: nowrap;
      padding: 10px 0;
      margin-bottom: 14px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .ticker-inner {
      display: inline-block;
      min-width: 100%;
      animation: scroll 30s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .ticker-item { margin-right: 24px; font-size: 0.9rem; }
    .up { color: var(--green); }
    .down { color: var(--red); }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric { padding: 14px; }
    .metric .label { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 1px; }
    .metric .value { font-size: 1.35rem; font-weight: 700; margin-top: 6px; }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }

    .panel { padding: 14px; }
    .panel h2 { margin: 0 0 10px; font-size: 1rem; }

    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    select {
      background: #0d1420;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 0.85rem;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .stock-card { padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: rgba(11,16,25,0.75); }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .ticker { font-size: 1.05rem; font-weight: 700; }
    .name { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
    .price { font-size: 1.1rem; font-weight: 700; }

    .micro {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .micro b { color: var(--text); display: block; font-size: 0.8rem; }

    .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
    .btn {
      padding: 7px 8px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .buy { background: #16a34a; }
    .sell { background: #dc2626; }
    .short { background: #475569; }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th, td { padding: 8px 6px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; }

    .rank-1 { border-left: 2px solid var(--gold); }

    .footer-note {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      background: rgba(20, 184, 166, 0.08);
    }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar glass">
      <div class="brand">
        <h1>GitExchange Pro</h1>
        <p>Pump-style market terminal for open-source assets + Solana settlement rail</p>
      </div>
      <div class="status">
        <span id="market-chip" class="chip">Loading</span>
        <span class="muted" id="clock">--</span>
      </div>
    </div>

    <div class="ticker-tape glass"><div id="ticker" class="ticker-inner"></div></div>

    <div class="metrics-grid">
      <div class="metric glass"><div class="label">Total Market Cap</div><div class="value" id="cap">--</div></div>
      <div class="metric glass"><div class="label">Listed Projects</div><div class="value" id="stocks">--</div></div>
      <div class="metric glass"><div class="label">Traders</div><div class="value" id="traders">--</div></div>
      <div class="metric glass"><div class="label">Last Update</div><div class="value" id="updated" style="font-size:1rem">--</div></div>
    </div>

    <div class="layout">
      <div>
        <section class="panel glass">
          <h2>Trading Chart</h2>
          <div class="controls">
            <select id="chart-stock"></select>
            <select id="chart-window">
              <option value="1">24H</option>
              <option value="7" selected>7D</option>
              <option value="30">30D</option>
            </select>
            <select id="chart-indicator">
              <option value="none" selected>No Indicator</option>
              <option value="sma">SMA (6)</option>
              <option value="ema">EMA (6)</option>
            </select>
          </div>
          <div style="position:relative;height:320px"><canvas id="chart"></canvas></div>
        </section>

        <section class="panel glass" style="margin-top:12px">
          <h2>Market Board</h2>
          <div id="cards" class="stock-grid"></div>
        </section>
      </div>

      <div>
        <section class="panel glass">
          <h2>Leaderboard</h2>
          <div id="leaderboard"></div>
        </section>
        <section class="panel glass" style="margin-top:12px">
          <h2>Recent Trades</h2>
          <div id="trades"></div>
        </section>
        <section class="panel glass" style="margin-top:12px">
          <h2>Solana Settlement</h2>
          <div id="solana" class="footer-note">Loading Solana config...</div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const REPO = 'barbrickdesign/GitExchange-enhancedByAgentR';
    const RAW = `https://raw.githubusercontent.com/${REPO}/main`;

    let state = { market: null, dashboard: null, config: null };
    let chart;

    function fmtMoney(n) {
      if (!Number.isFinite(Number(n))) return '$0.00';
      const v = Number(n);
      if (v >= 1e9) return `$${(v / 1e9).toFixed(2)}B`;
      if (v >= 1e6) return `$${(v / 1e6).toFixed(2)}M`;
      if (v >= 1e3) return `$${(v / 1e3).toFixed(1)}K`;
      return `$${v.toFixed(2)}`;
    }

    async function loadJSON(path) {
      try {
        const res = await fetch(`${RAW}/${path}?t=${Date.now()}`);
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    function renderHeader() {
      const market = state.market;
      if (!market) return;
      const stocks = Object.values(market.stocks || {}).filter(s => s.market_status !== 'DELISTED');
      const status = (market.market_status || 'unknown').toUpperCase();
      const chip = document.getElementById('market-chip');
      chip.textContent = status;
      chip.className = `chip ${status === 'OPEN' ? '' : 'closed'}`;
      document.getElementById('cap').textContent = fmtMoney(market.total_market_cap || 0);
      document.getElementById('stocks').textContent = stocks.length;
      document.getElementById('updated').textContent = (market.last_updated || '--').replace('T', ' ').slice(0, 16);
      document.getElementById('traders').textContent = (state.dashboard?.trader_count ?? '--');
    }

    function renderTickerTape() {
      const market = state.market;
      const el = document.getElementById('ticker');
      if (!market?.stocks) { el.textContent = 'Market data unavailable'; return; }
      const rows = Object.entries(market.stocks)
        .filter(([,s]) => s.market_status !== 'DELISTED')
        .sort((a,b) => (b[1].market_cap||0) - (a[1].market_cap||0))
        .slice(0, 18);
      const unit = rows.map(([t,s]) => {
        const c = Number(s.change_pct || 0);
        const cls = c >= 0 ? 'up' : 'down';
        const sign = c >= 0 ? '+' : '';
        return `<span class="ticker-item"><b>${t.toUpperCase()}</b> ${fmtMoney(s.price || 0)} <span class="${cls}">${sign}${c.toFixed(2)}%</span></span>`;
      }).join('');
      el.innerHTML = unit + unit;
    }

    function renderCards() {
      const market = state.market;
      const wrap = document.getElementById('cards');
      if (!market?.stocks) { wrap.innerHTML = '<p class="muted">No market data.</p>'; return; }
      const active = Object.entries(market.stocks)
        .filter(([,s]) => s.market_status !== 'DELISTED')
        .sort((a,b) => (b[1].market_cap||0) - (a[1].market_cap||0));

      wrap.innerHTML = active.map(([ticker, s]) => {
        const m = s.metrics || {};
        const change = Number(s.change_pct || 0);
        const cls = change >= 0 ? 'up' : 'down';
        const sign = change >= 0 ? '+' : '';
        return `
          <article class="stock-card">
            <div class="row">
              <div><div class="ticker">${ticker.toUpperCase()}</div><div class="name">${s.full_name || ticker}</div></div>
              <div style="text-align:right"><div class="price">${fmtMoney(s.price || 0)}</div><div class="${cls}">${sign}${change.toFixed(2)}%</div></div>
            </div>
            <div class="micro">
              <div><b>${(m.stars || 0).toLocaleString()}</b>Stars</div>
              <div><b>${(m.commits_week || 0).toLocaleString()}</b>Commits/W</div>
              <div><b>${fmtMoney(s.market_cap || 0)}</b>Cap</div>
            </div>
            <div class="btns">
              <a class="btn buy" href="https://github.com/${REPO}/issues/new?title=BUY+${ticker}+10&body=wallet:+\nsignature:+">BUY</a>
              <a class="btn sell" href="https://github.com/${REPO}/issues/new?title=SELL+${ticker}+5">SELL</a>
              <a class="btn short" href="https://github.com/${REPO}/issues/new?title=SHORT+${ticker}+10">SHORT</a>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderLeaderboard() {
      const data = state.dashboard?.leaderboard || [];
      const el = document.getElementById('leaderboard');
      if (!data.length) { el.innerHTML = '<p class="muted">No traders yet.</p>'; return; }
      let html = '<table><tr><th>Rank</th><th>Trader</th><th>Value</th><th>P&L</th></tr>';
      data.slice(0, 10).forEach((t, i) => {
        const pnlUp = Number(t.pnl || 0) >= 0;
        const cls = pnlUp ? 'up' : 'down';
        html += `<tr class="${i === 0 ? 'rank-1' : ''}"><td>${i + 1}</td><td>@${t.username}</td><td>${fmtMoney(t.total_value || 0)}</td><td class="${cls}">${pnlUp ? '+' : ''}${Number(t.pnl_pct || 0).toFixed(1)}%</td></tr>`;
      });
      html += '</table>';
      el.innerHTML = html;
    }

    async function renderTrades() {
      const el = document.getElementById('trades');
      const today = new Date();
      let all = [];
      for (let i = 0; i < 5; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const dateStr = d.toISOString().slice(0, 10);
        const data = await loadJSON(`data/history/trades/${dateStr}.json`);
        if (data?.trades) all = all.concat(data.trades);
      }
      if (!all.length) { el.innerHTML = '<p class="muted">No recent trades.</p>'; return; }
      all.sort((a,b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      let html = '<table><tr><th>Time</th><th>Action</th><th>Ticker</th><th>Qty</th></tr>';
      all.slice(0, 12).forEach(t => {
        const cls = (t.action === 'BUY' || t.action === 'COVER') ? 'up' : 'down';
        html += `<tr><td>${(t.timestamp || '').replace('T',' ').slice(5,16)}</td><td class="${cls}">${t.action || ''}</td><td>${(t.ticker || '').toUpperCase()}</td><td>${t.qty || 0}</td></tr>`;
      });
      html += '</table>';
      el.innerHTML = html;
    }

    function renderSolana() {
      const cfg = state.config?.solana;
      const el = document.getElementById('solana');
      if (!cfg) { el.textContent = 'Solana config not found.'; return; }
      el.innerHTML = `
        RPC: <b>${cfg.rpc_url || 'n/a'}</b><br>
        Mode: <b>${cfg.require_payment_for_buy ? 'Required for BUY' : 'Optional proof'}</b><br>
        Treasury: <code>${cfg.treasury_wallet || 'set in data/config.json'}</code><br>
        <span class="muted">Attach wallet + signature in BUY issue body for on-chain verification.</span>
      `;
    }

    function updateClock() {
      document.getElementById('clock').textContent = `UTC ${new Date().toISOString().replace('T', ' ').slice(0, 19)}`;
    }

    function calcSMA(values, period) {
      const out = [];
      for (let i = 0; i < values.length; i++) {
        if (i < period - 1 || values[i] == null) { out.push(null); continue; }
        const chunk = values.slice(i - period + 1, i + 1).filter(v => v != null);
        out.push(chunk.length ? chunk.reduce((a,b) => a + b, 0) / chunk.length : null);
      }
      return out;
    }

    function calcEMA(values, period) {
      const out = [];
      const k = 2 / (period + 1);
      let prev = null;
      values.forEach(v => {
        if (v == null) { out.push(null); return; }
        prev = prev == null ? v : (v * k + prev * (1 - k));
        out.push(prev);
      });
      return out;
    }

    async function chartSeries(ticker, days) {
      const labels = [];
      const values = [];
      const now = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        const dateStr = d.toISOString().slice(0, 10);
        const data = await loadJSON(`data/history/prices/${dateStr}.json`);
        if (!data?.snapshots) continue;
        for (const snap of data.snapshots) {
          labels.push(`${dateStr.slice(5)} ${(snap.time || '').slice(0,5)}`);
          values.push(Number((snap.prices || {})[ticker] ?? null));
        }
      }
      return { labels, values };
    }

    async function renderChart() {
      const ticker = document.getElementById('chart-stock').value;
      if (!ticker) return;
      const days = Number(document.getElementById('chart-window').value || 7);
      const indicator = document.getElementById('chart-indicator').value;
      const { labels, values } = await chartSeries(ticker, days);

      const datasets = [{
        label: `${ticker.toUpperCase()} Price`,
        data: values,
        borderColor: '#8b5cf6',
        backgroundColor: 'rgba(139, 92, 246, 0.12)',
        borderWidth: 2,
        pointRadius: 1,
        tension: 0.22,
        fill: true,
        spanGaps: true,
      }];

      if (indicator !== 'none') {
        const calc = indicator === 'sma' ? calcSMA(values, 6) : calcEMA(values, 6);
        datasets.push({
          label: indicator.toUpperCase(),
          data: calc,
          borderColor: '#14b8a6',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.2,
          spanGaps: true,
        });
      }

      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('chart').getContext('2d'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#e6edf3' } } },
          scales: {
            x: { ticks: { color: '#8ba0bb', maxTicksLimit: 10 }, grid: { color: '#243149' } },
            y: { ticks: { color: '#8ba0bb', callback: v => `$${v}` }, grid: { color: '#243149' } },
          }
        }
      });
    }

    function hydrateChartSelectors() {
      const market = state.market;
      if (!market?.stocks) return;
      const select = document.getElementById('chart-stock');
      const current = select.value;
      const options = Object.entries(market.stocks)
        .filter(([,s]) => s.market_status !== 'DELISTED')
        .sort((a,b) => (b[1].market_cap || 0) - (a[1].market_cap || 0));
      select.innerHTML = options.map(([ticker]) => `<option value="${ticker}">${ticker.toUpperCase()}</option>`).join('');
      if (current && options.some(([t]) => t === current)) select.value = current;
      select.onchange = renderChart;
      document.getElementById('chart-window').onchange = renderChart;
      document.getElementById('chart-indicator').onchange = renderChart;
    }

    async function refreshAll() {
      const [market, dashboard, config] = await Promise.all([
        loadJSON('data/market.json'),
        loadJSON('docs/dashboard.json'),
        loadJSON('data/config.json'),
      ]);
      state.market = market;
      state.dashboard = dashboard;
      state.config = config;

      renderHeader();
      renderTickerTape();
      renderCards();
      renderLeaderboard();
      renderSolana();
      hydrateChartSelectors();
      await Promise.all([renderChart(), renderTrades()]);
    }

    updateClock();
    setInterval(updateClock, 1000);
    refreshAll();
    setInterval(refreshAll, 20000);
  </script>
</body>
</html>
