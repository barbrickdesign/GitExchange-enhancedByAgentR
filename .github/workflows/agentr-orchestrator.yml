name: AgentR Orchestrator

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: agentr-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AgentR orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: engine
        run: python agentr_orchestrator.py

      - name: Commit and push updates
        run: |
          git config user.name "agentr-bot"
          git config user.email "bot@agentr.dev"
          git add data/ charts/ README.md docs/
          git diff --cached --quiet && exit 0
          git commit -m "🤖 AgentR orchestration $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3; do
            git push && break
            git pull --rebase
            sleep 2
          done
